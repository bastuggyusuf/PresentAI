<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>PresentAI</title>
  <style>
    * { box-sizing: border-box; }
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
    }
    .logo {
      font-size: 20px;
      font-weight: 800;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }
    .subtitle { color: #94a3b8; font-size: 12px; margin-bottom: 16px; }
    .status {
      padding: 12px;
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 10px;
      font-size: 12px;
      margin-bottom: 12px;
    }
    .row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; }
    .label { color: #94a3b8; font-size: 12px; }
    .value { font-weight: 600; }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 6px;
      color: white;
      font-size: 12px;
      margin-bottom: 8px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      font-size: 13px;
      margin-top: 8px;
    }
    button:hover { opacity: 0.9; }
    .help {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(148, 163, 184, 0.15);
      font-size: 11px;
      color: #94a3b8;
      line-height: 1.5;
    }
    a { color: #8b5cf6; text-decoration: none; }
  </style>
</head>
<body>
  <div class="logo">🎤 PresentAI</div>
  <div class="subtitle">Sunum koçun her çağrıda yanında</div>

  <div class="status" id="status">
    🔍 Aktif sekme kontrol ediliyor...
  </div>

  <div class="row">
    <span class="label">Bu oturumdaki sunumlar</span>
    <span class="value" id="session-count">0</span>
  </div>
  <div class="row">
    <span class="label">Toplam (genel)</span>
    <span class="value" id="total-count">0</span>
  </div>

  <div style="margin-top: 12px;">
    <label class="label" style="display: block; margin-bottom: 4px;">Backend URL</label>
    <input type="text" id="backend-url" placeholder="http://localhost:8000" />
    <label class="label" style="display: block; margin-bottom: 4px;">API Key (opsiyonel)</label>
    <input type="text" id="api-key" placeholder="dev modunda boş bırakın" />
    <button id="save-settings">Kaydet</button>
  </div>

  <div class="help">
    <strong>Nasıl kullanılır?</strong><br>
    1. Google Meet / Zoom / Teams aç<br>
    2. Sağ üstte beliren PresentAI panelinde "Başlat"a bas<br>
    3. Doğal davran, panel arka planda analiz yapar<br>
    <br>
    <a id="dashboard-link" href="http://localhost:8000/web/dashboard.html" target="_blank">📊 Web Dashboard'um</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
