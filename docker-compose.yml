version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./Backend/.env
    volumes:
      - ./Backend/data:/app/data
      - ./Backend/vector_db:/app/vector_db
      - ./web:/app/web
      - sqlite_data:/app/db
    environment:
      - PYTHONIOENCODING=utf-8
      - SEED_DATA=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  sqlite_data:
    driver: local
